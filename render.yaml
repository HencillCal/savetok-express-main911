services:
  - type: web
    name: tiktok-downloader
    env: node
    buildCommand: npm ci && npm run build
    startCommand: npm run preview -- --port $PORT
    plan: free
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
    envVars:
      - key: VITE_PERFRAME_URL
        value: "https://perframe-service.onrender.com"
      - key: NODE_ENV
        value: "production"
  - type: web
    name: perframe-service
    env: docker
    dockerfilePath: services/perframe/Dockerfile
    plan: starter
    autoDeploy: true
    envVars:
      - key: PERFRAME_CORS_ALLOWED_ORIGINS
        value: "*"
      - key: PERFRAME_JOBS_DIR
        value: "/tmp/perframe_jobs"