services:
  - type: web
    name: tiktok-downloader
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
  - type: web
    name: perframe-service
    env: docker
    dockerfilePath: services/perframe/Dockerfile
    plan: starter
    autoDeploy: true
    envVars:
      - key: PERFRAME_CORS_ALLOWED_ORIGINS
        value: "*"
      - key: PERFRAME_JOBS_DIR
        value: "/tmp/perframe_jobs"