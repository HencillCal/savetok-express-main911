app = "perframe-app"  # replace with your Fly app name (created with `flyctl apps create`)
primary_region = "iad"

[build]
  dockerfile = "services/perframe/Dockerfile"

[env]
  PERFRAME_CORS_ALLOWED_ORIGINS = "*"
  PERFRAME_JOBS_DIR = "/data/perframe_jobs"

[[mounts]]
  source = "perframe_data"
  destination = "/data"

[[services]]
  internal_port = 8000
  protocol = "tcp"

  [[services.ports]]
    handlers = ["http"]
    port = 80
